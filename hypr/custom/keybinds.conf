#!
##! Shell
bind = SUPER, P, exec, vicinae vicinae://extensions/vicinae/clipboard/history # Clipboard history
bind = SUPER, Period, exec, vicinae vicinae://extensions/vicinae/vicinae/search-emojis # Emoji database
bind = SUPER, B, global, quickshell:barToggle # Toggle bar
bind = SUPER, I, global, quickshell:sidebarLeftToggle # Toggle left sidebar
bind = SUPER, N, global, quickshell:sidebarRightToggle # Toggle right sidebar
bind = SUPER, K, global, quickshell:overlayToggle # Toggle overlay
bind = SUPER, Slash, global, quickshell:cheatsheetToggle # Toggle cheatsheet
bind = SUPER + CTRL, W, global, quickshell:wallpaperSelectorToggle # Wallpaper selector
bind = SUPER + CTRL + SHIFT, W, global, quickshell:wallpaperSelectorRandom # Random wallpaper
bind = SUPER + CTRL, T, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/colors/switchwall.sh # [hidden] Change wallpaper (fallback)
bind = SUPER + CTRL + SHIFT, P, global, quickshell:panelFamilyCycle # Cycle panel family
bind = SUPER + CTRL, R, exec, killall ags agsv1 gjs ydotool qs quickshell; qs -c $qsConfig & # Restart widgets

bind = CTRL + ALT, Delete, global, quickshell:sessionToggle # Toggle session menu
bind = CTRL + ALT, Delete, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill wlogout || wlogout -p layer-shell # [hidden] Session menu (fallback)


##! Media
bind = SUPER, M, global, quickshell:mediaControlsToggle # Toggle media controls
bindl = SUPER + SHIFT, M, exec, wpctl set-mute @DEFAULT_SINK@ toggle # Mute active sink
bindl = SUPER + ALT, M, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # Mute active source
bindl = SUPER + SHIFT, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # Next item
bindle =, XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment || brightnessctl s 5%+ # [hidden]
bindle =, XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement || brightnessctl s 5%- # [hidden]
bindle =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5# [hidden]
bindle =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- # [hidden]
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden] # FIX
bindl = Alt ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindl = ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl = ,XF86AudioPrev, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:276, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl = Super+Shift, B, exec, playerctl previous # Previous track
bindl = Super+Shift, P, exec, playerctl play-pause # Play/pause media
bindl = ,XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl = ,XF86AudioPause, exec, playerctl play-pause # [hidden]


##! Keyboard
bind = CTRL, Space, exec, hyprctl switchxkblayout current next
bind = SUPER, Comma, global, quickshell:oskToggle # Toggle on-screen keyboard

#!
##! Focus control
bind = CTRL, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1      # [hidden] 1
bind = CTRL, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2      # [hidden] 2
bind = CTRL, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3      # [hidden] 3
bind = CTRL, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4      # [hidden] 4
bind = CTRL, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5      # [hidden] 5
bind = CTRL, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6      # [hidden] 6
bind = CTRL, code:16, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7      # [hidden] 7
bind = CTRL, code:17, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8      # [hidden] 8
bind = CTRL, code:18, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9      # [hidden] 9
bind = CTRL, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10     # [hidden] 10
bind = CTRL, code:43, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace e-1    # [hidden] H
bind = CTRL, code:46, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace e+1    # [hidden] L
bind = CTRL, code:39, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh focusmonitor -1  # [hidden] S
bind = CTRL, code:42, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh focusmonitor +1  # [hidden] G

bind = SUPER, code:43, movefocus, l
bind = SUPER, code:44, movefocus, u
bind = SUPER, code:45, movefocus, d
bind = SUPER, code:46, movefocus, r


##! Window control
bind = SUPER + CTRL, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1  # [hidden] 1
bind = SUPER + CTRL, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2  # [hidden] 2
bind = SUPER + CTRL, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3  # [hidden] 3
bind = SUPER + CTRL, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4  # [hidden] 4
bind = SUPER + CTRL, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5  # [hidden] 5
bind = SUPER + CTRL, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6  # [hidden] 6
bind = SUPER + CTRL, code:16, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7  # [hidden] 7
bind = SUPER + CTRL, code:17, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8  # [hidden] 8
bind = SUPER + CTRL, code:18, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9  # [hidden] 9
bind = SUPER + CTRL, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9  # [hidden] 9

bind = SUPER + CTRL, code:43, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent -1 # [hidden] H
bind = SUPER + CTRL, code:46, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent +1 # [hidden] L

bind = SUPER + CTRL, code:39, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movewindow mon:-1        # [hidden] S
bind = SUPER + CTRL, code:42, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movewindow mon:+1        # [hidden] G

bind = SUPER + SHIFT, code:43, swapwindow, l
bind = SUPER + SHIFT, code:44, swapwindow, u
bind = SUPER + SHIFT, code:45, swapwindow, d
bind = SUPER + SHIFT, code:46, swapwindow, r

bind = SUPER + CTRL, F, togglefloating, # Toggle floating
bind = SUPER + CTRL, P, pseudo, # Toggle floating
bind = SUPER + CTRL, D, pin, # Pin window
bind = SUPER, F, fullscreen, 1 # Maximise
bind = SUPER + SHIFT, F, fullscreen, 2 # Fullscreen
bind = SUPER + SHIFT + CTRL, F, fullscreenstate, 0 3 # Fullscreen spoof
bind = SUPER, Q, killactive, # Close
bind = SUPER + SHIFT, Q, exec, hyprctl kill # Kill
bind = ALT, F4, killactive, # [hidden] Close (Windows)

bindm = SUPER, mouse:272, movewindow # Move
bindm = SUPER, mouse:274, movewindow # [hidden]
bindm = SUPER, mouse:273, resizewindow # Resize
binde = SUPER, right,resizeactive,10 0 # [hidden]
binde = SUPER, left,resizeactive,-10 0 # [hidden]
binde = SUPER, up,resizeactive,0 -10 # [hidden]
binde = SUPER, down,resizeactive,0 10 # [hidden]

bind = SUPER + CTRL, Apostrophe, movetoworkspacesilent, special # Send to scratchpad
bind = SUPER + CTRL, U, togglespecialworkspace, # Toggle scratchpad
bind = SUPER + CTRL, Enter, togglespecialworkspace, # Toggle scratchpad
bind = SUPER + CTRL, mouse:275, togglespecialworkspace, # [hidden]

#!
##! Utilities
# Screenshot, Record, OCR, Color picker, Clipboard history
# bindd = Super, V, Copy clipboard history entry, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy # [hidden] Clipboard history >> clipboard (fallback)
# bindd = Super, Period, Copy an emoji, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy # [hidden] Emoji >> clipboard (fallback)
bind = SUPER + SHIFT, 3, global, quickshell:regionScreenshot # Screen snip
bind = SUPER + SHIFT, 3, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || hyprshot --freeze --clipboard-only --mode region --silent # [hidden] Screen snip (fallback)
bind = SUPER + SHIFT, 2, global, quickshell:regionSearch # Google Lens
bind = SUPER + SHIFT, 2, exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || ~/.config/hypr/hyprland/scripts/snip_to_search.sh # [hidden] Google Lens (fallback)
# OCR
bind = SUPER+SHIFT, X, global, quickshell:regionOcr # Character recognition >> clipboard
bind = SUPER+SHIFT, X,exec, qs -c $qsConfig ipc call TEST_ALIVE || pidof slurp || grim -g "$(slurp $SLURP_ARGS)" "/tmp/ocr_image.png" && tesseract "/tmp/ocr_image.png" stdout -l $(tesseract --list-langs | awk 'NR>1{print $1}' | tr '\\n' '+' | sed 's/\\+$/\\n/') | wl-copy && rm "/tmp/ocr_image.png" # [hidden]
# Color picker
bindd = SUPER+SHIFT, C, Color picker, exec, hyprpicker -a # Pick color (Hex) >> clipboard
# Fullscreen screenshot
bindl = ,Print,exec,grim - | wl-copy # Screenshot >> clipboard
bindln = Ctrl,Print, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Screenshot >> clipboard & file (file)
bindln = Ctrl,Print,exec,grim - | wl-copy # [hidden] Screenshot >> clipboard & file (clipboard)
# Recording stuff
bindl = Super+Shift, R, global, quickshell:regionRecord # Record region (no sound)
bindl = Super+Shift, R, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/videos/record.sh # [hidden] Record region (no sound) (fallback)
bindl = Ctrl+Alt, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen # [hidden] Record screen (no sound)
bindl = Super+Shift+Alt, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen --sound # Record screen (with sound)
# AI
bindd = Super+Shift+Alt, mouse:273, Generate AI summary for selected text, exec, ~/.config/hypr/hyprland/scripts/ai/primary-buffer-query.sh # [hidden] AI summary for selected text

##! Virtual machines
bind = Super+Alt, F1, exec, notify-send 'Entered Virtual Machine submap' 'Keybinds disabled. Hit Super+Alt+F1 to escape' -a 'Hyprland' && hyprctl dispatch submap virtual-machine # Disable keybinds
submap = virtual-machine
bind = Super+Alt, F1, exec, notify-send 'Exited Virtual Machine submap' 'Keybinds re-enabled' -a 'Hyprland' && hyprctl dispatch submap global # [hidden]
submap = global

# Testing
bind = Super+Alt, f11, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "Test notification with body image" "This notification should contain your user account <b>image</b> and <a href=\"https://discord.com/app\">Discord</a> <b>icon</b>. Oh and here is a random image in your Pictures folder: <img src=\"$RANDOM_IMAGE\" alt=\"Testing image\"/>" -a "Hyprland keybind" -p -h "string:image-path:/var/lib/AccountsService/icons/$USER" -t 6000 -i "discord" -A "openImage=Profile image" -A "action2=Open the random image" -A "action3=Useless button"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"; [[ $ACTION == *action2 ]] && xdg-open \"$RANDOM_IMAGE\"' # [hidden]
bind = Super+Alt, f12, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "Test notification" "This notification should contain a random image in your <b>Pictures</b> folder and <a href=\"https://discord.com/app\">Discord</a> <b>icon</b>.\n<i>Flick right to dismiss!</i>" -a "Discord (fake)" -p -h "string:image-path:$RANDOM_IMAGE" -t 6000 -i "discord" -A "openImage=Profile image" -A "action2=Useless button"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"' # [hidden]
bind = Super+Alt, Equal, exec, notify-send "Urgent notification" "Ah hell no" -u critical -a 'Hyprland keybind' # [hidden]

##! Apps
bind = SUPER, Space, exec, vicinae toggle # App menu
bind = SUPER, W, exec, zen-browser  # Browser
bind = SUPER, Return, exec, kitty # Terminal
bind = SUPER, E, exec, dolphin  # File manager
bind = SUPER, T, exec, pkill btop || kitty -T btop -c ~/.config/kitty/btop.conf btop # Task manager
# bind = SUPER, Escape, exec, pkill -f settings.qml # [hidden] close previous settings window
bind = SUPER, Escape, exec, qs -p ~/.config/quickshell/$qsConfig/settings.qml # Settings app

bind = Ctrl+Super, V, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "pavucontrol-qt" "pavucontrol" # Volume mixer

##! Session
bindd = SUPER + SHIFT, Q, Lock, exec, loginctl lock-session # Lock
bindld = SUPER + SHIFT + CTRL, Q, Suspend system, exec, systemctl suspend || loginctl suspend # Sleep
bindd = CTRL + SHIFT + ALT + SUPER, Delete, Shutdown, exec, systemctl poweroff || loginctl poweroff # [hidden] Power off

##! Screen
# Zoom
binde = SUPER, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.3 # Zoom out
binde = SUPER, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.3 # Zoom in
bind = SUPER, mouse_down, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.25 # Zoom out
bind = SUPER, mouse_up, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.25 # Zoom in
bind = SUPER, 0, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 10 # Reset zoom

# Cursed stuff
## Make window not amogus large
bind = Ctrl+Super, Backslash, resizeactive, exact 640 480 # [hidden]
# bindl=,switch:on:Lid Switch, exec, systemctl suspend || loginctl suspend # [hidden] Suspend when laptop lid is closed, uncomment if for whatever reason it's not the default behavior

# Workaround for the zen browser that is yet to allow tab cycling
binde = ALT, u, exec, hyprctl dispatch sendshortcut "ALT, u, activewindow" # [hidden]
binde = ALT, w, exec, hyprctl dispatch sendshortcut "ALT, w, activewindow" # [hidden]
binde = ALT, n, exec, hyprctl dispatch sendshortcut "ALT, n, activewindow" # [hidden]
binde = ALT, h, exec, hyprctl dispatch sendshortcut "ALT, h, activewindow" # [hidden]
binde = ALT, j, exec, hyprctl activewindow | grep -q "class: zen" && hyprctl dispatch sendshortcut "CTRL, page_down, activewindow" || hyprctl dispatch sendshortcut "ALT, j, activewindow" # [hidden]
binde = ALT, k, exec, hyprctl activewindow | grep -q "class: zen" && hyprctl dispatch sendshortcut "CTRL, page_up, activewindow" || hyprctl dispatch sendshortcut "ALT, k, activewindow" # [hidden]
binde = ALT, l, exec, hyprctl dispatch sendshortcut "ALT, l, activewindow" # [hidden]

# Workaround for obsidian
binde = CTRL, j, exec, hyprctl activewindow | grep -q "class: obsidian" && hyprctl dispatch sendshortcut ", down, activewindow" || hyprctl dispatch sendshortcut "CTRL, j, activewindow" # [hidden]
binde = CTRL, k, exec, hyprctl activewindow | grep -q "class: obsidian" && hyprctl dispatch sendshortcut ", up, activewindow" || hyprctl dispatch sendshortcut "CTRL, k, activewindow" # [hidden]
