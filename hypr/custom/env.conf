# You can put extra environment variables here
# https://wiki.hyprland.org/Configuring/Environment-variables/

# ######### Input method ##########
# See https://fcitx-im.org/wiki/Using_Fcitx_5_on_Wayland
#env = QT_IM_MODULE, fcitx
#env = XMODIFIERS, @im=fcitx
#env = SDL_IM_MODULE, fcitx
#env = GLFW_IM_MODULE, ibus
#env = INPUT_METHOD, fcitx

# ######## Wayland #########
# Tearing
# env = WLR_DRM_NO_ATOMIC, 1
# ?
# env = WLR_NO_HARDWARE_CURSORS, 1

env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# ######## EDITOR #########
#https://wiki.archlinux.org/title/Category:Text_editors
# for example: vi nano nvim ...

#env = EDITOR, vim
# XDG SPECIFICATIONS
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GDK SPECIFICATIONS
env = GDK_BACKEND,wayland

# THEME RELATED ENVS
# env = GTK_THEME,WhiteSur-Dark-solid
# env = XCURSOR_THEME,WhiteSur-cursors
# env = XCURSOR_SIZE,16
# env = HYPRCURSOR_THEME,WhiteSur-cursors
# env = HYPRCURSOR_SIZE,16

# SET WAYLAND AS A COMPOSITOR FOR FIREFOX
env = MOZ_ENABLE_WAYLAND,1

# QT
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, kde

# SDL2
env = SDL_VIDEODRIVER,wayland

# GLFW
env = GLFW_USE_WAYLAND,1

# NVIDIA 
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
# env = NVD_BACKEND,direct

# ENABLE GPU ACCELERATION
env = WLR_RENDERER_ALLOW_SOFTWARE,1
